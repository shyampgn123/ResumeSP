<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Viewer</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9JR411S4C0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-9JR411S4C0');
</script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:#ffffff;
    font-family:Arial, sans-serif;
}

#loader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
    z-index:10000;
    font-size:18px;
    font-weight:600;
}

#downloadBtn{
    position:fixed;
    top:10px;
    right:10px;
    z-index:9999;
    display:none;
    padding:6px 10px;
    background:#2563eb;
    color:#ffffff;
    text-decoration:none;
    border-radius:6px;
    font-size:11px;
    font-weight:600;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

#downloadBtn:hover{
    opacity:0.9;
}

iframe{
    width:100%;
    height:100vh;
    border:none;
}

@media (max-width:768px){
    #downloadBtn{
        padding:5px 8px;
        font-size:10px;
        top:8px;
        right:8px;
    }

    #loader{
        font-size:16px;
    }
}
</style>
</head>
<body>

<div id="loader">
    Loading Resume...
</div>

<a
    id="downloadBtn"
    href="https://drive.google.com/uc?export=download&id=1wViOKwxO_wv1VegnZ68QrdJ88pOI0P0N"
    target="_blank"
>
    ⬇ Download
</a>

<iframe
    src="https://drive.google.com/file/d/1wViOKwxO_wv1VegnZ68QrdJ88pOI0P0N/preview"
    onload="
        document.getElementById('loader').style.display='none';
        document.getElementById('downloadBtn').style.display='block';
    ">
</iframe>

</body>
</html>
